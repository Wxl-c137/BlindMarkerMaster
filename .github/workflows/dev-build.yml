name: Dev Build

# 每次推送到 dev 分支时触发，构建三平台产物并滚动更新 pre-release "dev-latest"
on:
  push:
    branches: [dev]
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target aarch64-apple-darwin
            target: aarch64-apple-darwin
            label: macOS-Apple-Silicon
          - platform: macos-latest
            args: --target x86_64-apple-darwin
            target: x86_64-apple-darwin
            label: macOS-Intel
          - platform: windows-latest
            args: --target x86_64-pc-windows-msvc
            target: x86_64-pc-windows-msvc
            label: Windows-x64
          - platform: ubuntu-22.04
            args: --target x86_64-unknown-linux-gnu
            target: x86_64-unknown-linux-gnu
            label: Linux-x64

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'
          key: dev-${{ matrix.target }}

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install frontend dependencies
        run: npm ci

      # 创建或更新滚动 pre-release tag "dev-latest"
      - name: Update dev-latest tag
        if: matrix.platform == 'ubuntu-22.04'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -f dev-latest
          git push origin dev-latest --force

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: dev-latest
          releaseName: 'BlindMark Master dev-latest'
          releaseBody: |
            ## Dev Build（开发预览版）

            > ⚠️ 此版本由 `dev` 分支自动构建，功能未经完整测试，仅供开发预览。
            > 稳定版请前往 [Releases](../../releases) 下载正式版本。

            **最新提交**：${{ github.sha }}

            ### 下载说明
            | 文件 | 平台 |
            |------|------|
            | `*_aarch64.dmg` | macOS Apple Silicon（M1/M2/M3） |
            | `*_x64.dmg` | macOS Intel |
            | `*_x64-setup.exe` | Windows 64位安装版（推荐） |
            | `*_x64_en-US.msi` | Windows 64位 MSI |
            | `*_x64_portable.zip` | Windows 64位便携版 |
            | `*_amd64.AppImage` | Linux AppImage |
            | `*_amd64.deb` | Linux Debian/Ubuntu |
          releaseDraft: false
          prerelease: true
          args: ${{ matrix.args }}

      # Windows 便携版
      - name: Package Windows portable zip
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $exe = "src-tauri/target/${{ matrix.target }}/release/blindmark-master.exe"
          if (-not (Test-Path $exe)) {
            Write-Error "EXE not found: $exe"
            exit 1
          }
          $zipName = "BlindMark.Master_dev_x64_portable.zip"
          Compress-Archive -Path $exe -DestinationPath $zipName
          gh release upload "dev-latest" $zipName --clobber
