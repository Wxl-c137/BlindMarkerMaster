name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target aarch64-apple-darwin
            target: aarch64-apple-darwin
            label: macOS-Apple-Silicon
          - platform: macos-latest
            args: --target x86_64-apple-darwin
            target: x86_64-apple-darwin
            label: macOS-Intel
          - platform: windows-latest
            args: --target x86_64-pc-windows-msvc
            target: x86_64-pc-windows-msvc
            label: Windows-x64
          - platform: ubuntu-22.04
            args: --target x86_64-unknown-linux-gnu
            target: x86_64-unknown-linux-gnu
            label: Linux-x64

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'
          key: ${{ matrix.target }}

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri app
        id: tauri_build
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'BlindMark Master ${{ github.ref_name }}'
          releaseBody: |
            ## BlindMark Master ${{ github.ref_name }}

            批量盲水印工具，支持 .zip / .7z / .var / .rar 压缩包。

            ### 下载说明
            | 文件 | 平台 |
            |------|------|
            | `*_aarch64.dmg` | macOS Apple Silicon（M1/M2/M3） |
            | `*_x64.dmg` | macOS Intel |
            | `*_x64-setup.exe` | Windows 64位安装版（推荐） |
            | `*_x64_en-US.msi` | Windows 64位 MSI |
            | `*_x64_portable.zip` | Windows 64位便携版（无需安装，解压即用） |
            | `*_amd64.AppImage` | Linux AppImage（免安装） |
            | `*_amd64.deb` | Linux Debian/Ubuntu 安装包 |
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}

      # Windows 便携版：tauri-action 完成后再打包上传
      - name: Package Windows portable zip
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $version = "${{ github.ref_name }}".TrimStart("v")
          $exe = "src-tauri/target/${{ matrix.target }}/release/blindmark-master.exe"
          if (-not (Test-Path $exe)) {
            Write-Error "EXE not found: $exe"
            exit 1
          }
          $zipName = "BlindMark.Master_${version}_x64_portable.zip"
          Compress-Archive -Path $exe -DestinationPath $zipName
          gh release upload "${{ github.ref_name }}" $zipName --clobber
